<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hiền Lành - Bản Nâng Cấp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-wrapper">
        <header>
            <h1>🤖 AI Hiền Lành</h1>
            <p>Phiên bản kết nối API thực tế</p>
        </header>
        
        <div id="chat-box"></div>

        <div class="input-group">
            <input type="text" id="user-input" placeholder="Hỏi AI bất cứ điều gì..." autocomplete="off">
            <button id="send-btn">Gửi</button>
        </div>
        <button id="clear-btn">Xóa lịch sử</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
